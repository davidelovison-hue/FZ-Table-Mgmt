<aside class="sidebar" [ngClass]="{ 'sidebar--is-open': isOpen }">
  <ul class="sidebar__menu">
    <ng-container *ngFor="let item of menuItems; trackBy: trackByLabel">
      <li>
        <app-menu-item
          [item]="item"
          (toggled)="toggleSection(item)" />

        <ng-container *ngIf="item.items?.length">
          <div
            class="sidebar__section"
            [ngClass]="{ 'sidebar__section--is-open': item.isOpen }">
            <ul class="sidebar-menu-section">
              <ng-container *ngFor="let child of item.items; trackBy: trackByLabel">
                <li class="sidebar-menu-section__item">
                  <app-menu-item [item]="child" />
                </li>
              </ng-container>
            </ul>
          </div>
        </ng-container>
      </li>
    </ng-container>
  </ul>
</aside>
